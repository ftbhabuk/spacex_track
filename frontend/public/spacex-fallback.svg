<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">SpaceX Tracker Fallback Artwork</title>
  <desc id="desc">A stylized orbital scene used when remote images are unavailable.</desc>
  <defs>
