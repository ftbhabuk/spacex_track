      <stop offset="0%" stop-color="#07111f"/>
      <stop offset="55%" stop-color="#0d1d33"/>
      <stop offset="100%" stop-color="#1d3d5c"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#9ed8ff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#9ed8ff" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="1280" cy="160" r="84" fill="#d8ebff" opacity="0.9"/>
