name: Sync SpaceX Assets

on:
  workflow_dispatch:
  schedule:
    - cron: "15 */6 * * *"

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Backend Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Seed SpaceX Asset Baseline
        run: python backend/seed_spacex_assets.py

      - name: Sync Latest SpaceXNow Data
        run: python backend/sync_spacex_assets.py
